<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vecto — Simulateur Client WhatsApp</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #fff; height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    .header { background: #1a1a1a; padding: 16px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #2a2a2a; }
    .header-logo { font-size: 22px; font-weight: 800; color: #E85D04; }
    .phone-input { flex: 1; background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 8px 12px; color: #fff; font-size: 14px; }
    .phone-input:focus { outline: none; border-color: #E85D04; }
    .status-badge { font-size: 12px; padding: 4px 10px; border-radius: 20px; font-weight: 600; }
    .status-pending    { background: #2a2a00; color: #ffd700; }
    .status-assigned   { background: #002a2a; color: #00d4d4; }
    .status-in_progress{ background: #001a2a; color: #4db8ff; }
    .status-done       { background: #002a00; color: #4dff88; }
    .status-none       { background: #2a2a2a; color: #888; }

    /* Messages */
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 72%; padding: 10px 14px; border-radius: 12px; font-size: 15px; line-height: 1.4; word-break: break-word; }
    .msg.client { align-self: flex-end; background: #E85D04; color: #fff; border-bottom-right-radius: 4px; }
    .msg.driver  { align-self: flex-start; background: #1e1e1e; color: #eee; border-bottom-left-radius: 4px; border: 1px solid #2a2a2a; }
    .msg .time { font-size: 11px; opacity: 0.6; margin-top: 4px; text-align: right; }
    .msg .role { font-size: 11px; font-weight: 600; margin-bottom: 3px; opacity: 0.7; }

    .empty { flex: 1; display: flex; align-items: center; justify-content: center; color: #444; font-size: 15px; text-align: center; padding: 40px; }

    /* Input */
    .input-bar { background: #1a1a1a; padding: 12px 16px; display: flex; gap: 10px; border-top: 1px solid #2a2a2a; }
    .msg-input { flex: 1; background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 24px; padding: 12px 18px; color: #fff; font-size: 15px; resize: none; height: 48px; }
    .msg-input:focus { outline: none; border-color: #E85D04; }
    .send-btn { background: #E85D04; border: none; border-radius: 50%; width: 48px; height: 48px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity .2s; }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.4; cursor: default; }
    .send-btn svg { width: 22px; height: 22px; fill: #fff; }

    /* Location btn */
    .loc-btn { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 50%; width: 48px; height: 48px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #888; font-size: 20px; transition: all .2s; }
    .loc-btn:hover { background: #333; color: #E85D04; border-color: #E85D04; }

    /* Toast */
    .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 99; }
    .toast.show { opacity: 1; }

    /* Scrollbar */
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
  </style>
</head>
<body>

<div class="header">
  <span class="header-logo">Vecto</span>
  <input class="phone-input" id="phoneInput" type="tel" placeholder="+222 XX XX XX XX (votre numéro client)" value="+22234478444" />
  <span class="status-badge status-none" id="statusBadge">—</span>
</div>

<div class="messages" id="messages">
  <div class="empty" id="emptyMsg">
    Entrez un numéro et envoyez un message pour démarrer une commande.
  </div>
</div>

<div class="input-bar">
  <button class="loc-btn" id="locBtn" title="Envoyer ma position">📍</button>
  <input class="msg-input" id="msgInput" placeholder="Écrivez votre message..." />
  <button class="send-btn" id="sendBtn">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:3000';
const WA_PHONE_ID = '118697175782842';

let pollInterval = null;
let lastMessageCount = 0;
let currentDeliveryId = null;

function getPhone() { return document.getElementById('phoneInput').value.trim(); }

function showToast(msg, duration = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function formatTime(iso) {
  return new Date(iso).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

function statusLabel(s) {
  const map = { pending: 'En attente', assigned: 'Livreur assigné', in_progress: 'En cours', done: 'Livré ✓', cancelled: 'Annulé' };
  return map[s] || s;
}

function renderMessages(messages, delivery) {
  const container = document.getElementById('messages');
  const empty = document.getElementById('emptyMsg');
  const badge = document.getElementById('statusBadge');

  if (delivery) {
    badge.textContent = statusLabel(delivery.status);
    badge.className = 'status-badge status-' + delivery.status;
    currentDeliveryId = delivery.id;
  } else {
    badge.textContent = '—';
    badge.className = 'status-badge status-none';
    currentDeliveryId = null;
  }

  if (!messages || messages.length === 0) {
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  const atBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 60;
  const existing = container.querySelectorAll('.msg');

  // Ajouter seulement les nouveaux messages
  for (let i = existing.length; i < messages.length; i++) {
    const m = messages[i];
    const div = document.createElement('div');
    div.className = 'msg ' + m.sender_role;

    let content = '';
    if (m.type === 'text') content = m.content || '';
    else if (m.type === 'location') {
      const meta = typeof m.meta === 'string' ? JSON.parse(m.meta) : m.meta;
      content = `📍 Position : ${meta?.label || `${meta?.lat}, ${meta?.lng}`}`;
    } else if (m.type === 'audio') content = '🎵 Message audio';
    else if (m.type === 'image') content = '🖼️ Image';
    else content = m.content || '';

    div.innerHTML = `
      <div class="role">${m.sender_role === 'client' ? 'Vous' : 'Livreur'}</div>
      ${content}
      <div class="time">${formatTime(m.createdAt)}</div>
    `;
    container.appendChild(div);
  }

  if (atBottom || messages.length !== lastMessageCount) {
    container.scrollTop = container.scrollHeight;
  }
  lastMessageCount = messages.length;
}

async function loadConversation() {
  const phone = getPhone();
  if (!phone) return;
  try {
    const res = await fetch(`${API}/sim/conversation?phone=${encodeURIComponent(phone)}`);
    if (!res.ok) return;
    const data = await res.json();
    renderMessages(data.messages, data.delivery);
  } catch {}
}

function buildWaPayload(type, phone, body) {
  const msg = {
    id: `wamid.sim_${Date.now()}`,
    from: phone.replace(/[^\d]/g, ''),
    timestamp: Math.floor(Date.now() / 1000).toString(),
    type,
  };
  if (type === 'text') msg.text = { body };
  if (type === 'location') msg.location = body;
  return {
    object: 'whatsapp_business_account',
    entry: [{ id: 'sim_entry', changes: [{ value: {
      messaging_product: 'whatsapp',
      metadata: { phone_number_id: WA_PHONE_ID },
      messages: [msg],
    }}]}],
  };
}

async function sendMessage(type, body) {
  const phone = getPhone();
  if (!phone) { showToast('Entrez un numéro de téléphone'); return; }

  const payload = buildWaPayload(type, phone, body);
  try {
    const res = await fetch(`${API}/webhook/whatsapp`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (res.ok) {
      setTimeout(loadConversation, 600);
    } else {
      showToast('Erreur envoi : ' + res.status);
    }
  } catch (e) {
    showToast('Erreur réseau — backend démarré ?');
  }
}

// Send text
document.getElementById('sendBtn').addEventListener('click', () => {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  sendMessage('text', text);
});

document.getElementById('msgInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    document.getElementById('sendBtn').click();
  }
});

// Send location
document.getElementById('locBtn').addEventListener('click', () => {
  if (!navigator.geolocation) { showToast('Géolocalisation non supportée'); return; }
  showToast('Récupération de la position...');
  navigator.geolocation.getCurrentPosition(
    (pos) => sendMessage('location', {
      latitude: pos.coords.latitude,
      longitude: pos.coords.longitude,
      name: 'Ma position',
      address: `${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`,
    }),
    () => {
      // Position simulée (Nouakchott) si refus
      sendMessage('location', { latitude: 18.0735, longitude: -15.9582, name: 'Marché Capitale', address: 'Nouakchott' });
    }
  );
});

// Changer de numéro = reset affichage
document.getElementById('phoneInput').addEventListener('change', () => {
  document.getElementById('messages').querySelectorAll('.msg').forEach(el => el.remove());
  document.getElementById('emptyMsg').style.display = 'flex';
  lastMessageCount = 0;
  loadConversation();
});

// Polling toutes les 2s
loadConversation();
pollInterval = setInterval(loadConversation, 2000);
</script>
</body>
</html>
